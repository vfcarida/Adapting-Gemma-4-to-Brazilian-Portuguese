# ╔══════════════════════════════════════════════════════════════════════╗
# ║  CPT Main — Gemma-4-26B-A4B Continued Pretraining Config            ║
# ║  Multi-GPU with DeepSpeed ZeRO-3 for the MoE production model       ║
# ╚══════════════════════════════════════════════════════════════════════╝

# ── Model ────────────────────────────────────────────────────────────
model:
  model_id: "google/gemma-4-26B-A4B"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"
  trust_remote_code: true

# ── Dataset ──────────────────────────────────────────────────────────
data:
  dataset_id: "Itau-Unibanco/Aurora-PT"
  streaming: true
  max_seq_len: 4096
  pt_ratio: 0.85
  en_ratio: 0.15
  en_dataset_id: "HuggingFaceFW/fineweb-edu"
  num_shards: 4
  shard_index: 0                    # override per-rank via launcher

# ── LoRA / PEFT ──────────────────────────────────────────────────────
peft:
  r: 128
  lora_alpha: 256
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  modules_to_exclude:
    - ".*vision_tower.*"
    - ".*audio_tower.*"
    - ".*multi_modal_projector.*"

# ── Training ─────────────────────────────────────────────────────────
training:
  output_dir: "./output/cpt_main_26b"
  num_train_epochs: 1
  max_steps: 100000
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16   # effective batch = 1 * 16 * num_gpus
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false

  # ── DeepSpeed ────────────────────────────────────────────────────
  deepspeed: "./configs/ds_zero3.json"

  # ── Logging ──────────────────────────────────────────────────────
  logging_steps: 10
  logging_dir: "./reports/training_logs/cpt_main"
  report_to:
    - "wandb"
    - "tensorboard"
  run_name: "cpt-main-26b-a4b"

  # ── Saving ───────────────────────────────────────────────────────
  save_strategy: "steps"
  save_steps: 5000
  save_total_limit: 3

  # ── Evaluation ───────────────────────────────────────────────────
  eval_strategy: "steps"
  eval_steps: 5000
  per_device_eval_batch_size: 2

  # ── Misc ─────────────────────────────────────────────────────────
  seed: 42
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  remove_unused_columns: false
  ddp_find_unused_parameters: false
