# =============================================================================
# Configuração do Modelo — Gemma 4 31B Dense (Trilha Opcional)
# =============================================================================
# Modelo: google/gemma-4-31B (base) / google/gemma-4-31B-it (instruct)
# Arquitetura: Dense transformer, 31B parâmetros
# Uso: Trilha opcional final se orçamento computacional permitir
# TODO: Confirmar model IDs exatos quando disponíveis publicamente

model:
  base_id: "google/gemma-4-31B"
  instruct_id: "google/gemma-4-31B-it"
  family: "gemma4"
  architecture: "dense"
  params_total: "31B"
  dtype: "bfloat16"
  max_seq_length: 8192
  attn_implementation: "flash_attention_2"
  trust_remote_code: true

  text_only_mode: true
  freeze_vision_encoder: true
  freeze_multi_modal_projector: true

tokenizer:
  use_fast: true
  padding_side: "right"
  add_eos_token: true
  use_apply_chat_template: true

chat_template_fallback:
  bos_token: "<bos>"
  user_prefix: "<start_of_turn>user\n"
  user_suffix: "<end_of_turn>\n"
  model_prefix: "<start_of_turn>model\n"
  model_suffix: "<end_of_turn>\n"
  system_prefix: "<start_of_turn>system\n"
  system_suffix: "<end_of_turn>\n"
  think_open: "<think>\n"
  think_close: "</think>\n"

thinking:
  empty_channel_for_non_think: true

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

vocab_expansion:
  enabled: false
  sizes: [8000, 16000, 32000]
  preserve_special_tokens: true
  init_method: "mean"
