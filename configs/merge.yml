# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Residual Merge Config — Task Arithmetic                             ║
# ╚══════════════════════════════════════════════════════════════════════╝

merge:
  # ── Checkpoint Paths ───────────────────────────────────────────────
  base_model_id: "google/gemma-4-E4B"
  instruct_model_id: "google/gemma-4-E4B-it"
  cpt_model_path: "./output/cpt_pilot_e4b/final"

  # ── Output ─────────────────────────────────────────────────────────
  output_dir: "./output/merged"
  output_name_template: "gemma-4-E4B-ptbr-merged-alpha{alpha}"

  # ── Alpha Sweep ────────────────────────────────────────────────────
  # Task Arithmetic formula:
  #   inst_residual = instruct_weights - base_weights
  #   merged = cpt_weights + (alpha * inst_residual)
  alpha_values:
    - 0.5
    - 0.7
    - 0.8
    - 0.9
    - 1.0

  # ── Safety ─────────────────────────────────────────────────────────
  # Validate tensor shapes match before merging
  validate_shapes: true
  # Save in safetensors format
  save_safetensors: true
  # Torch dtype for computations
  torch_dtype: "bfloat16"
  # Device for tensor operations (use "cpu" for large models)
  device: "cpu"
