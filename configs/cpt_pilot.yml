# ╔══════════════════════════════════════════════════════════════════════╗
# ║  CPT Pilot — Gemma-4-E4B Continued Pretraining Config               ║
# ║  Single-GPU (A100-80GB) configuration for rapid iteration            ║
# ╚══════════════════════════════════════════════════════════════════════╝

# ── Model ────────────────────────────────────────────────────────────
model:
  model_id: "google/gemma-4-E4B"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"       # or "flash_attention_2" if available
  trust_remote_code: true

# ── Dataset ──────────────────────────────────────────────────────────
data:
  dataset_id: "Itau-Unibanco/Aurora-PT"
  streaming: true
  max_seq_len: 4096
  # Replay mix: proportion of Portuguese vs English
  pt_ratio: 0.85
  en_ratio: 0.15
  en_dataset_id: "HuggingFaceFW/fineweb-edu"
  # Number of shards for data parallelism
  num_shards: 1
  shard_index: 0

# ── LoRA / PEFT ──────────────────────────────────────────────────────
peft:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  # CRITICAL: Only target language-model linear layers.
  # Never use "all-linear" — it crashes on Gemma4ClippableLinear
  # in the vision/audio towers.
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  # Regex patterns to explicitly exclude multimodal modules
  modules_to_exclude:
    - ".*vision_tower.*"
    - ".*audio_tower.*"
    - ".*multi_modal_projector.*"

# ── Training ─────────────────────────────────────────────────────────
training:
  output_dir: "./output/cpt_pilot_e4b"
  num_train_epochs: 1
  max_steps: 50000                  # override epochs if set to > 0
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8    # effective batch = 2 * 8 = 16
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false

  # ── Logging ──────────────────────────────────────────────────────
  logging_steps: 10
  logging_dir: "./reports/training_logs/cpt_pilot"
  report_to:
    - "wandb"
    - "tensorboard"
  run_name: "cpt-pilot-e4b"

  # ── Saving ───────────────────────────────────────────────────────
  save_strategy: "steps"
  save_steps: 2500
  save_total_limit: 5

  # ── Evaluation ───────────────────────────────────────────────────
  eval_strategy: "steps"
  eval_steps: 2500
  per_device_eval_batch_size: 4

  # ── Misc ─────────────────────────────────────────────────────────
  seed: 42
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  remove_unused_columns: false
  ddp_find_unused_parameters: false
